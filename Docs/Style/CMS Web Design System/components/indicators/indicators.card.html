<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: center; }
  .h { font-family: var(--font-label); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-subtle); margin-bottom: 12px; }
  .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
</style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Spinner, ProgressBar, Gauge, Skeleton } = window.CMSWebDesignSystem_cd3e62;
  function Demo() {
    return (
      <div className="grid">
        <div>
          <div className="h">Spinners</div>
          <div className="row" style={{ marginBottom: 24 }}>
            <Spinner size={24} />
            <Spinner size={32} color="var(--caution-gold)" />
            <Spinner size={28} label="Loading reports…" />
          </div>
          <div className="h">Progress</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <ProgressBar label="Compliance rate" value={98.2} showValue />
            <ProgressBar label="Data ingest" value={64} tone="gold" showValue />
            <ProgressBar indeterminate tone="navy" />
          </div>
        </div>
        <div>
          <div className="h">Gauges</div>
          <div className="row" style={{ marginBottom: 18 }}>
            <Gauge value={98.2} label="Compliance" tone="navy" size={130} />
            <Gauge value={42} max={60} unit="" label="Pending" tone="gold" size={130} />
          </div>
          <div className="h">Skeleton</div>
          <div className="row">
            <Skeleton variant="circle" width={44} />
            <div style={{ flex: 1, minWidth: 160 }}><Skeleton variant="text" lines={3} /></div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
