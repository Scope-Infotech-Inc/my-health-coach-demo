<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--white); display: flex; gap: 22px; align-items: center; }
  .tile { width: 140px; height: 120px; border-radius: var(--radius-lg); border: 1px solid var(--border-hairline); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-top: 8px; text-align: center; }
  .item { text-align: center; }
</style>
</head>
<body>
  <div class="item"><div class="tile cms-dotgrid"></div><div class="lbl">navy on white</div></div>
  <div class="item"><div class="tile cms-dotgrid-gold" style="background-color:var(--navy-deep)"></div><div class="lbl">gold on navy</div></div>
  <div class="item"><div class="tile cms-grid-pattern" style="background-color:var(--white)"></div><div class="lbl">chart grid-pattern</div></div>
</body>
</html>
