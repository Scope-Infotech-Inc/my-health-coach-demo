<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="Strictly linear, 8px base" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--white); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--navy-deep); border-radius: var(--radius-sm); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="lbl">4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="lbl">8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="lbl">12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="lbl">16</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="lbl">24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">32</div></div>
    <div class="item"><div class="bar" style="width:40px;height:40px"></div><div class="lbl">40</div></div>
    <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="lbl">64</div></div>
  </div>
</body>
</html>
