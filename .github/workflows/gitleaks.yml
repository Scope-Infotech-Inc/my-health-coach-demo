name: gitleaks

# Secret-scanning gate for pull requests. Scans only the commits this PR
# introduces (base..head), so a secret in unrelated history can't block an
# unrelated PR. To block merge, mark the "Scan for secrets" check as Required
# in branch protection / a ruleset on the protected branch(es).
on:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan commits added by this PR
        # SHAs are passed via env (not interpolated into the shell) per GitHub
        # Actions injection guidance. base.sha/head.sha are hex commit IDs, but
        # we use the safe pattern uniformly.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gitleaks git \
            --no-banner \
            --redact \
            --verbose \
            --exit-code 1 \
            --log-opts="${BASE_SHA}..${HEAD_SHA}"
